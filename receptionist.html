<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f8fa;
    }

    .dashboard-header {
      background-color: #00796b;
      /* Teal */
      color: white;
      padding: 20px 30px;
      border-radius: 0 0 10px 10px;
      margin-bottom: 30px;
    }

    .dashboard-header h1 {
      margin: 0;
    }

    .search-print-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .search-box {
      flex: 1 1 300px;
      margin-right: 10px;
    }

    .print-btn {
      white-space: nowrap;
    }

    .table th {
      background-color: #e0f2f1;
    }

    @media print {

      .search-print-container,
      .dashboard-header {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="dashboard-header">
    <h1>Medical Dashboard</h1>
  </div>

  <div class="container">
    <!-- Search and Print -->
    <div class="search-print-container">
      <input type="text" id="searchInput" class="form-control search-box" placeholder="Search patient by name..."
        onkeyup="searchTable()">
      <button onclick="window.print()" class="btn btn-primary print-btn">🖨️ Print</button>
    </div>

    <!-- Patient Table -->
    <div class="table-responsive">
      <table class="table table-bordered table-striped" id="patientTable">
        <thead>
          <tr>
            <th>Patient Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Department</th>
            <th>Admit Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Aarav Patel</td>
            <td>34</td>
            <td>Male</td>
            <td>Cardiology</td>
            <td>2025-07-21</td>
          </tr>
          <tr>
            <td>Neha Sharma</td>
            <td>29</td>
            <td>Female</td>
            <td>Neurology</td>
            <td>2025-07-19</td>
          </tr>
          <tr>
            <td>Rohan Mehta</td>
            <td>41</td>
            <td>Male</td>
            <td>Orthopedics</td>
            <td>2025-07-20</td>
          </tr>
          <tr>
            <td>Vikram Desai</td>
            <td>50</td>
            <td>Male</td>
            <td>Oncology</td>
            <td>2025-07-18</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function searchTable() {
      let input = document.getElementById("searchInput").value.toLowerCase();
      let rows = document.querySelectorAll("#patientTable tbody tr");

      rows.forEach(row => {
        const patientName = row.cells[0].textContent.toLowerCase();
        row.style.display = patientName.includes(input) ? "" : "none";
      });
    }
  </script>

</body>

</html>
