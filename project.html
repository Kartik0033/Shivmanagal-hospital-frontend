<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Shivmangal Hospital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
    }

    .section-info {
      width: 100%;
      display: flex;
      justify-content: center;
      background-color: #a76262;

    }

    .info-wrapper {
      display: flex;
      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      max-width: 1400px;
      width: 100%;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      padding: 30px;
      /* ADDITIONAL PADDING */
      /* SPACING BETWEEN TEXT AND IMAGE BOXES */
    }

    .text-box {
      flex: 1;
      background-color: #007b8a;
      color: white;
      padding: 40px;
      border-radius: 80px 0 0 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .text-box h1 {
      font-size: 36px;
      margin: 10px 0;
    }

    .text-box p {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .text-box button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: white;
      color: #007b8a;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      width: fit-content;
    }

    .image-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-box img {
      width: 100%;
      max-width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 0 20px 20px 0;
    }

    @media (max-width: 768px) {
      .info-wrapper {
        flex-direction: column;
        padding: 20px;
        border-radius: 20px;
      }

      .text-box {
        border-radius: 20px 20px 0 0;
        text-align: center;
        padding: 30px 20px;
      }

      .image-box img {
        border-radius: 0 0 20px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="section-info" id="section-container">
    <div class="info-wrapper">
      <div class="text-box">
        <p>Beyond Boundaries</p>
        <h1>Shivmangal Multispeciality Hospital</h1>
        <p>with Cutting-Edge Medical Service Across All Specialties</p>
        <button>ENQUIRE NOW</button>
      </div>
      <div class="image-box">
        <img src="images/inside.jpg" alt="Shivmangal Hospital">
      </div>
    </div>
  </div>

</body>

</html>
